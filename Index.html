<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1C1B1F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Presupuesto Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1C1B1F; color: #E6E1E5; }
        .md3-card { background-color: #2B2930; border-radius: 1.5rem; }
        .md3-input { background-color: #4A4458; color: #E6E1E5; border-radius: 0.5rem; border: 1px solid transparent; transition: all 0.2s; }
        .md3-input:focus { border-color: #D0BCFF; outline: none; background-color: #36343B; }
        .md3-checkbox { appearance: none; width: 1.25rem; height: 1.25rem; border: 2px solid #CAC4D0; border-radius: 0.25rem; cursor: pointer; position: relative; transition: all 0.2s; }
        .md3-checkbox:checked { background-color: #D0BCFF; border-color: #D0BCFF; }
        .md3-checkbox:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px; border: solid #381E72; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .item-checked { text-decoration: line-through; color: #938F99; }
        
        .fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background-color: #D0BCFF; color: #381E72; width: 3.5rem; height: 3.5rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.2s; z-index: 50; }
        .fab:active { transform: scale(0.95); }
        .spinner { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #snackbar { visibility: hidden; min-width: 250px; background-color: #313033; color: #F4EFF4; text-align: center; border-radius: 0.5rem; padding: 1rem; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body class="pb-24 p-4 md:p-8 max-w-lg mx-auto md:max-w-4xl">

    <header class="mb-6">
        <h1 class="text-2xl font-bold mb-4 flex items-center gap-2 text-[#D0BCFF]">
            <span class="material-symbols-outlined">account_balance_wallet</span> Gestor de Presupuesto
        </h1>
        <div class="relative">
            <input type="text" id="budget-name" placeholder="Nombre (ej. Quincena 1 - Abril)" class="md3-input w-full p-4 text-lg font-medium" value="Quincena Actual">
        </div>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div class="md3-card p-6 flex flex-col items-center justify-center">
            <h2 class="text-sm font-semibold text-[#CAC4D0] mb-2 uppercase tracking-wide">Distribución de Gasto Real</h2>
            <div class="w-48 h-48 relative">
                <canvas id="expenseChart"></canvas>
            </div>
        </div>

        <div class="md3-card p-6 grid grid-cols-2 gap-4">
            <div class="col-span-2 bg-[#36343B] p-4 rounded-xl border border-[#4A4458]">
                <p class="text-xs text-[#CAC4D0] uppercase font-semibold">Total General</p>
                <p id="sum-total-real" class="text-3xl font-bold text-[#D0BCFF] font-mono">Q 0.00</p>
                <div class="flex justify-between mt-2 text-sm">
                    <span class="text-[#938F99]">Presup: <span id="sum-total-presup">Q 0.00</span></span>
                    <span id="diff-total" class="font-bold">Q 0.00</span>
                </div>
            </div>
            
            <div class="bg-[#36343B] p-3 rounded-xl border border-[#4A4458]">
                <p class="text-[10px] text-[#CAC4D0] uppercase font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[14px] text-yellow-400">soap</span> Insumos</p>
                <p id="sum-insumos-real" class="text-lg font-bold font-mono">Q 0.00</p>
                <p id="diff-insumos" class="text-xs text-right mt-1 font-bold">Q 0.00</p>
            </div>
            
            <div class="bg-[#36343B] p-3 rounded-xl border border-[#4A4458]">
                <p class="text-[10px] text-[#CAC4D0] uppercase font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[14px] text-green-400">restaurant</span> Comida</p>
                <p id="sum-comida-real" class="text-lg font-bold font-mono">Q 0.00</p>
                <p id="diff-comida" class="text-xs text-right mt-1 font-bold">Q 0.00</p>
            </div>

            <div class="bg-[#36343B] p-3 rounded-xl border border-[#4A4458] col-span-2">
                <p class="text-[10px] text-[#CAC4D0] uppercase font-semibold flex items-center gap-1"><span class="material-symbols-outlined text-[14px] text-blue-400">home</span> Casa</p>
                <div class="flex justify-between items-end">
                    <p id="sum-casa-real" class="text-lg font-bold font-mono">Q 0.00</p>
                    <p id="diff-casa" class="text-xs font-bold">Q 0.00</p>
                </div>
            </div>
        </div>
    </div>

    <div id="lists-container" class="space-y-6"></div>

    <button id="fab-sync" class="fab" onclick="syncData()">
        <span id="fab-icon" class="material-symbols-outlined text-3xl">cloud_sync</span>
        <span id="fab-spinner" class="material-symbols-outlined text-3xl spinner">progress_activity</span>
    </button>

    <div id="snackbar">Sincronizado correctamente</div>

    <script>
        // CONFIGURACIÓN: Reemplaza esta URL por la que te dé Google Apps Script
        const GOOGLE_SCRIPT_URL = https://script.google.com/macros/s/AKfycby6wy-vP9t-C1iQldvJwC-qDfeL-04u-663-QrQN-r2QgQxeEJaMeCsxoyQAe3TUCu_/exec;

        const defaultData = {
            insumos: [
                { id: "i1", nombre: "Shampoo", budget: 70.00, actual: 70.00, checked: false },
                { id: "i2", nombre: "Acondicionador", budget: 70.00, actual: 70.00, checked: false },
                { id: "i3", nombre: "Pasta dental", budget: 100.00, actual: 100.00, checked: false },
                { id: "i4", nombre: "Jabón de manos", budget: 15.00, actual: 15.00, checked: false },
                { id: "i5", nombre: "Jabón de Cuerpo", budget: 36.00, actual: 36.00, checked: false },
                { id: "i6", nombre: "Pashte", budget: 20.00, actual: 20.00, checked: false },
                { id: "i7", nombre: "Desodorante Mujer", budget: 70.00, actual: 70.00, checked: false },
                { id: "i8", nombre: "Desodorante Hombre", budget: 70.00, actual: 70.00, checked: false },
                { id: "i9", nombre: "Rasuradora Mujer", budget: 15.00, actual: 15.00, checked: false },
                { id: "i10", nombre: "Rasuradora Hombre", budget: 15.00, actual: 15.00, checked: false },
                { id: "i11", nombre: "Toallitas Sanitarias", budget: 15.00, actual: 15.00, checked: false },
                { id: "i12", nombre: "Toallitas Limpiadoras", budget: 15.00, actual: 15.00, checked: false },
                { id: "i13", nombre: "Toallitas Humeda", budget: 10.50, actual: 10.50, checked: false }
            ],
            comida: [
                { id: "c1", nombre: "Queso Crema", budget: 64.00, actual: 64.00, checked: false },
                { id: "c2", nombre: "Yogurt Griego", budget: 42.00, actual: 42.00, checked: false },
                { id: "c3", nombre: "Avena", budget: 10.45, actual: 10.45, checked: false },
                { id: "c4", nombre: "Granola", budget: 19.00, actual: 19.00, checked: false },
                { id: "c5", nombre: "Pan Sandwich", budget: 21.00, actual: 21.00, checked: false },
                { id: "c6", nombre: "Leche", budget: 24.00, actual: 24.00, checked: false },
                { id: "c7", nombre: "Jalea", budget: 20.00, actual: 20.00, checked: false }
            ],
            casa: [
                { id: "h1", nombre: "Papel de Baño", budget: 34.00, actual: 34.00, checked: false },
                { id: "h2", nombre: "Jabón de Ropa", budget: 17.00, actual: 17.00, checked: false },
                { id: "h3", nombre: "Suavitel", budget: 17.00, actual: 17.00, checked: false },
                { id: "h4", nombre: "Aceite", budget: 15.00, actual: 15.00, checked: false },
                { id: "h5", nombre: "Jabón de Trastos", budget: 15.00, actual: 15.00, checked: false }
            ]
        };

        let appData = JSON.parse(localStorage.getItem('budgetAppData')) || defaultData;
        let chartInstance = null;

        const categoryConfig = {
            insumos: { title: 'Insumos Personales', icon: 'soap', color: '#FCD34D', bg: 'bg-[#36343B]' },
            comida: { title: 'Gastos de Comida', icon: 'restaurant', color: '#86EFAC', bg: 'bg-[#36343B]' },
            casa: { title: 'Gastos de Casa', icon: 'home', color: '#93C5FD', bg: 'bg-[#36343B]' }
        };

        function saveLocal() {
            localStorage.setItem('budgetAppData', JSON.stringify(appData));
            updateUI();
        }

        function formatQ(val) { return `Q ${Math.abs(val).toFixed(2)}`; }
        
        function setDiffUI(elementId, diffVal) {
            const el = document.getElementById(elementId);
            el.textContent = (diffVal >= 0 ? '+' : '-') + formatQ(diffVal);
            el.className = `text-xs font-bold text-right mt-1 ${diffVal >= 0 ? 'text-[#81C995]' : 'text-[#F2B8B5]'}`;
        }

        function updateUI() {
            let totals = { insumos: { b:0, a:0 }, comida: { b:0, a:0 }, casa: { b:0, a:0 } };
            let grandB = 0, grandA = 0;

            Object.keys(appData).forEach(cat => {
                appData[cat].forEach(item => {
                    totals[cat].b += item.budget;
                    totals[cat].a += item.actual;
                });
                grandB += totals[cat].b;
                grandA += totals[cat].a;

                document.getElementById(`sum-${cat}-real`).textContent = formatQ(totals[cat].a);
                setDiffUI(`diff-${cat}`, totals[cat].b - totals[cat].a);
            });

            document.getElementById('sum-total-real').textContent = formatQ(grandA);
            document.getElementById('sum-total-presup').textContent = formatQ(grandB);
            setDiffUI('diff-total', grandB - grandA);

            updateChart([totals.insumos.a, totals.comida.a, totals.casa.a]);
        }

        function initChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Insumos', 'Comida', 'Casa'],
                    datasets: [{
                        data: [0, 0, 0],
                        backgroundColor: ['#FCD34D', '#86EFAC', '#93C5FD'],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: { display: false },
                        tooltip: { backgroundColor: '#313033', titleColor: '#E6E1E5', bodyColor: '#E6E1E5' }
                    }
                }
            });
        }

        function updateChart(dataArray) {
            if(chartInstance) {
                chartInstance.data.datasets[0].data = dataArray;
                chartInstance.update();
            }
        }

        function renderLists() {
            const container = document.getElementById('lists-container');
            container.innerHTML = '';

            Object.keys(appData).forEach(cat => {
                const conf = categoryConfig[cat];
                let html = `
                <div class="md3-card overflow-hidden">
                    <div class="p-4 flex items-center gap-2 border-b border-[#4A4458] bg-[#36343B]">
                        <span class="material-symbols-outlined" style="color: ${conf.color}">${conf.icon}</span>
                        <h3 class="font-semibold text-[#E6E1E5]">${conf.title}</h3>
                    </div>
                    <div class="p-2 space-y-1">`;
                
                appData[cat].forEach((item, index) => {
                    html += `
                        <div class="flex items-center gap-3 p-3 bg-[#1C1B1F] rounded-xl">
                            <input type="checkbox" class="md3-checkbox shrink-0" ${item.checked ? 'checked' : ''} 
                                onchange="toggleCheck('${cat}', ${index})">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate ${item.checked ? 'item-checked' : ''}">${item.nombre}</p>
                                <p class="text-[10px] text-[#CAC4D0]">P: ${formatQ(item.budget)}</p>
                            </div>
                            <div class="flex items-center bg-[#36343B] rounded-lg p-1 border border-[#4A4458]">
                                <span class="text-xs text-[#CAC4D0] ml-2">Q</span>
                                <input type="number" step="0.01" value="${item.actual.toFixed(2)}" 
                                    class="w-16 bg-transparent text-right text-sm font-bold text-[#D0BCFF] outline-none p-1"
                                    onchange="updateActual('${cat}', ${index}, this.value)">
                            </div>
                        </div>`;
                });
                
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function toggleCheck(cat, index) {
            appData[cat][index].checked = !appData[cat][index].checked;
            saveLocal();
            renderLists();
        }

        function updateActual(cat, index, value) {
            appData[cat][index].actual = parseFloat(value) || 0;
            saveLocal();
        }

        function showSnackbar(msg, isError = false) {
            const sb = document.getElementById("snackbar");
            sb.textContent = msg;
            sb.style.backgroundColor = isError ? '#F2B8B5' : '#313033';
            sb.style.color = isError ? '#601410' : '#F4EFF4';
            sb.className = "show";
            setTimeout(() => { sb.className = sb.className.replace("show", ""); }, 3000);
        }

        async function syncData() {
            if(GOOGLE_SCRIPT_URL === 'REEMPLAZAR_CON_TU_URL_DE_APPS_SCRIPT') {
                showSnackbar("Error: Configura la URL de Apps Script", true);
                return;
            }

            const icon = document.getElementById('fab-icon');
            const spinner = document.getElementById('fab-spinner');
            const budgetName = document.getElementById('budget-name').value || 'Sin Nombre';

            icon.style.display = 'none';
            spinner.style.display = 'block';

            const payload = {
                budgetName: budgetName,
                data: appData
            };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                showSnackbar("Sincronización enviada a Google Sheets");
            } catch (error) {
                showSnackbar("Error de conexión", true);
            } finally {
                icon.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            renderLists();
            updateUI();
        });
    </script>
</body>
</html>
