<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1C1B1F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Presupuesto Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1C1B1F; color: #E6E1E5; }
        .md3-card { background-color: #2B2930; border-radius: 1.5rem; }
        .md3-input { background-color: #4A4458; color: #E6E1E5; border-radius: 0.5rem; border: 1px solid transparent; transition: all 0.2s; }
        .md3-input:focus { border-color: #D0BCFF; outline: none; background-color: #36343B; }
        .md3-checkbox { appearance: none; width: 1.25rem; height: 1.25rem; border: 2px solid #CAC4D0; border-radius: 0.25rem; cursor: pointer; position: relative; transition: all 0.2s; }
        .md3-checkbox:checked { background-color: #D0BCFF; border-color: #D0BCFF; }
        .md3-checkbox:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px; border: solid #381E72; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .item-checked { text-decoration: line-through; color: #938F99; }
        
        .tab-btn { flex: 1; padding: 0.75rem; text-align: center; font-size: 0.875rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.2s; color: #CAC4D0; }
        .tab-active { background-color: #4A4458; color: #D0BCFF; }

        .fab { position: fixed; bottom: 1.5rem; right: 1.5rem; background-color: #D0BCFF; color: #381E72; width: 3.5rem; height: 3.5rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15); cursor: pointer; transition: transform 0.2s; z-index: 50; }
        .fab:active { transform: scale(0.95); }
        .spinner { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #snackbar { visibility: hidden; min-width: 250px; background-color: #313033; color: #F4EFF4; text-align: center; border-radius: 0.5rem; padding: 1rem; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
    </style>
</head>
<body class="pb-24 p-4 md:p-8 max-w-lg mx-auto md:max-w-4xl">

    <header class="mb-6">
        <h1 class="text-2xl font-bold mb-4 flex items-center gap-2 text-[#D0BCFF]">
            <span class="material-symbols-outlined">account_balance_wallet</span> Gestor de Presupuesto
        </h1>
        <input type="text" id="budget-name" placeholder="Nombre (ej. Quincena 1)" class="md3-input w-full p-4 text-lg font-medium" value="Quincena Actual">
    </header>

    <div class="flex bg-[#36343B] rounded-xl p-1 mb-6 border border-[#4A4458]">
        <button onclick="switchTab('super')" id="tab-super" class="tab-btn tab-active">🛒 Súper / Casa</button>
        <button onclick="switchTab('general')" id="tab-general" class="tab-btn">💳 Gastos Generales</button>
    </div>

    <div class="md3-card p-6 mb-6 text-center border border-[#4A4458]">
        <p class="text-xs text-[#CAC4D0] uppercase font-semibold tracking-widest">Gasto Real Global</p>
        <p id="sum-total-real" class="text-4xl font-bold text-[#D0BCFF] font-mono mt-2">Q 0.00</p>
        <div class="flex justify-center items-center gap-4 mt-3 text-sm">
            <span class="text-[#938F99]">Presup: <span id="sum-total-presup">Q 0.00</span></span>
            <span id="diff-total" class="font-bold px-2 py-1 rounded-md bg-[#1C1B1F]">Q 0.00</span>
        </div>
    </div>

    <div class="md3-card p-6 flex flex-col items-center justify-center mb-6">
        <h2 id="chart-title" class="text-sm font-semibold text-[#CAC4D0] mb-2 uppercase tracking-wide">Distribución de Vista Actual</h2>
        <div class="w-48 h-48 relative">
            <canvas id="expenseChart"></canvas>
        </div>
    </div>

    <div id="lists-container" class="space-y-6"></div>

    <button id="fab-sync" class="fab" onclick="syncData()">
        <span id="fab-icon" class="material-symbols-outlined text-3xl">cloud_sync</span>
        <span id="fab-spinner" class="material-symbols-outlined text-3xl spinner">progress_activity</span>
    </button>

    <div id="snackbar">Sincronizado correctamente</div>

    <script>
        // CONFIGURACIÓN: Reemplaza esta URL por tu enlace de Apps Script
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby6wy-vP9t-C1iQldvJwC-qDfeL-04u-663-QrQN-r2QgQxeEJaMeCsxoyQAe3TUCu_/exec';

        const defaultData = {
            // PESTAÑA 1: Súper y Casa
            insumos: [
                { id: "i1", nombre: "Shampoo / Acondicionador", budget: 140.00, actual: 140.00, checked: false },
                { id: "i3", nombre: "Pasta dental", budget: 100.00, actual: 100.00, checked: false },
                { id: "i5", nombre: "Jabón de Cuerpo / Manos", budget: 51.00, actual: 51.00, checked: false },
                { id: "i7", nombre: "Desodorantes", budget: 140.00, actual: 140.00, checked: false },
                { id: "i9", nombre: "Rasuradoras", budget: 30.00, actual: 30.00, checked: false },
                { id: "i11", nombre: "Toallitas Varias", budget: 40.50, actual: 40.50, checked: false }
            ],
            comida: [
                { id: "c1", nombre: "Queso Crema / Yogurt", budget: 106.00, actual: 106.00, checked: false },
                { id: "c3", nombre: "Avena / Granola", budget: 29.45, actual: 29.45, checked: false },
                { id: "c5", nombre: "Pan Sandwich", budget: 21.00, actual: 21.00, checked: false },
                { id: "c6", nombre: "Leche", budget: 24.00, actual: 24.00, checked: false }
            ],
            casa: [
                { id: "h1", nombre: "Papel de Baño", budget: 34.00, actual: 34.00, checked: false },
                { id: "h2", nombre: "Jabón Ropa / Suavitel", budget: 34.00, actual: 34.00, checked: false },
                { id: "h4", nombre: "Aceite", budget: 15.00, actual: 15.00, checked: false }
            ],
            
            // PESTAÑA 2: Gastos Generales
            servicios: [
                { id: "s1", nombre: "Internet Residencial", budget: 250.00, actual: 250.00, checked: false },
                { id: "s2", nombre: "Plan Celular", budget: 150.00, actual: 150.00, checked: false }
            ],
            transporte: [
                { id: "t1", nombre: "Gasolina (Moto)", budget: 150.00, actual: 150.00, checked: false },
                { id: "t2", nombre: "Parqueo / Peajes", budget: 50.00, actual: 50.00, checked: false }
            ],
            compromisos: [
                { id: "g1", nombre: "Cuota Apartamento", budget: 1000.00, actual: 1000.00, checked: false },
                { id: "g2", nombre: "Fondo Viaje / Fin de semana", budget: 400.00, actual: 400.00, checked: false },
                { id: "g3", nombre: "Universidad", budget: 200.00, actual: 200.00, checked: false }
            ]
        };

        const tabConfig = {
            super: ['insumos', 'comida', 'casa'],
            general: ['servicios', 'transporte', 'compromisos']
        };

        const categoryStyles = {
            insumos: { title: 'Insumos Personales', icon: 'soap', color: '#FCD34D' },
            comida: { title: 'Comida', icon: 'restaurant', color: '#86EFAC' },
            casa: { title: 'Limpieza Casa', icon: 'home', color: '#93C5FD' },
            servicios: { title: 'Servicios', icon: 'wifi', color: '#F87171' },
            transporte: { title: 'Transporte', icon: 'two_wheeler', color: '#C084FC' },
            compromisos: { title: 'Compromisos / Ahorros', icon: 'account_balance', color: '#6EE7B7' }
        };

        let appData = JSON.parse(localStorage.getItem('budgetAppData_v2')) || defaultData;
        let chartInstance = null;
        let activeTab = 'super';

        function saveLocal() {
            localStorage.setItem('budgetAppData_v2', JSON.stringify(appData));
            updateUI();
        }

        function formatQ(val) { return `Q ${Math.abs(val).toFixed(2)}`; }

        function switchTab(tabName) {
            activeTab = tabName;
            document.getElementById('tab-super').classList.toggle('tab-active', tabName === 'super');
            document.getElementById('tab-general').classList.toggle('tab-active', tabName === 'general');
            renderLists();
            updateUI();
        }

        function updateUI() {
            let globalB = 0, globalA = 0;
            let chartLabels = [], chartData = [], chartColors = [];

            // Calcular el gran total global
            Object.keys(appData).forEach(cat => {
                let catB = 0, catA = 0;
                appData[cat].forEach(item => { catB += item.budget; catA += item.actual; });
                globalB += catB;
                globalA += catA;

                // Extraer datos solo para el gráfico de la pestaña activa
                if (tabConfig[activeTab].includes(cat)) {
                    chartLabels.push(categoryStyles[cat].title);
                    chartData.push(catA);
                    chartColors.push(categoryStyles[cat].color);
                }
            });

            // Actualizar interfaz Global
            document.getElementById('sum-total-real').textContent = formatQ(globalA);
            document.getElementById('sum-total-presup').textContent = formatQ(globalB);
            
            const diffGlobal = globalB - globalA;
            const diffEl = document.getElementById('diff-total');
            diffEl.textContent = (diffGlobal >= 0 ? '+' : '-') + formatQ(diffGlobal);
            diffEl.className = `font-bold px-2 py-1 rounded-md bg-[#1C1B1F] ${diffGlobal >= 0 ? 'text-[#81C995]' : 'text-[#F2B8B5]'}`;

            updateChart(chartLabels, chartData, chartColors);
        }

        function initChart() {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: [], datasets: [{ data: [], backgroundColor: [], borderWidth: 0, hoverOffset: 4 }] },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#313033', titleColor: '#E6E1E5', bodyColor: '#E6E1E5' } }
                }
            });
        }

        function updateChart(labels, dataArray, colors) {
            if(chartInstance) {
                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = dataArray;
                chartInstance.data.datasets[0].backgroundColor = colors;
                chartInstance.update();
            }
        }

        function renderLists() {
            const container = document.getElementById('lists-container');
            container.innerHTML = '';
            const categoriesToShow = tabConfig[activeTab];

            categoriesToShow.forEach(cat => {
                const conf = categoryStyles[cat];
                let catA = 0;
                appData[cat].forEach(item => catA += item.actual);

                let html = `
                <div class="md3-card overflow-hidden">
                    <div class="p-4 flex items-center justify-between border-b border-[#4A4458] bg-[#36343B]">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined" style="color: ${conf.color}">${conf.icon}</span>
                            <h3 class="font-semibold text-[#E6E1E5]">${conf.title}</h3>
                        </div>
                        <span class="text-sm font-bold font-mono text-[#D0BCFF]">${formatQ(catA)}</span>
                    </div>
                    <div class="p-2 space-y-1">`;
                
                appData[cat].forEach((item, index) => {
                    html += `
                        <div class="flex items-center gap-3 p-3 bg-[#1C1B1F] rounded-xl">
                            <input type="checkbox" class="md3-checkbox shrink-0" ${item.checked ? 'checked' : ''} 
                                onchange="toggleCheck('${cat}', ${index})">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate ${item.checked ? 'item-checked' : ''}">${item.nombre}</p>
                                <p class="text-[10px] text-[#CAC4D0]">Presupuesto: ${formatQ(item.budget)}</p>
                            </div>
                            <div class="flex items-center bg-[#36343B] rounded-lg p-1 border border-[#4A4458]">
                                <span class="text-xs text-[#CAC4D0] ml-2">Q</span>
                                <input type="number" step="0.01" value="${item.actual.toFixed(2)}" 
                                    class="w-16 bg-transparent text-right text-sm font-bold text-[#D0BCFF] outline-none p-1"
                                    onchange="updateActual('${cat}', ${index}, this.value)">
                            </div>
                        </div>`;
                });
                
                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function toggleCheck(cat, index) { appData[cat][index].checked = !appData[cat][index].checked; saveLocal(); renderLists(); }
        function updateActual(cat, index, value) { appData[cat][index].actual = parseFloat(value) || 0; saveLocal(); renderLists(); }

        function showSnackbar(msg, isError = false) {
            const sb = document.getElementById("snackbar");
            sb.textContent = msg;
            sb.style.backgroundColor = isError ? '#F2B8B5' : '#313033';
            sb.style.color = isError ? '#601410' : '#F4EFF4';
            sb.className = "show";
            setTimeout(() => { sb.className = sb.className.replace("show", ""); }, 3000);
        }

        async function syncData() {
            if(GOOGLE_SCRIPT_URL === 'PEGAR_AQUI_TU_ENLACE') { showSnackbar("Error: Falta la URL de Apps Script", true); return; }
            const icon = document.getElementById('fab-icon'), spinner = document.getElementById('fab-spinner');
            icon.style.display = 'none'; spinner.style.display = 'block';

            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ budgetName: document.getElementById('budget-name').value || 'Sin Nombre', data: appData })
                });
                showSnackbar("Sincronización completada");
            } catch (error) { showSnackbar("Error de conexión", true); } 
            finally { icon.style.display = 'block'; spinner.style.display = 'none'; }
        }

        document.addEventListener('DOMContentLoaded', () => { initChart(); switchTab('super'); });
    </script>
</body>
</html>
