<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1C1B1F">
    <title>Presupuesto Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1C1B1F; color: #E6E1E5; scroll-behavior: smooth; }
        .md3-card { background-color: #2B2930; border-radius: 1.5rem; }
        .md3-input { background-color: #4A4458; color: #E6E1E5; border-radius: 0.5rem; border: 1px solid transparent; outline: none; transition: all 0.2s; padding: 0.5rem; width: 100%; text-align: right; font-family: monospace; font-size: 1rem; }
        .md3-input:focus { border-color: #D0BCFF; background-color: #36343B; }
        .md3-input-text { text-align: left; font-family: 'Inter', sans-serif; }
        .md3-checkbox { appearance: none; width: 1.25rem; height: 1.25rem; border: 2px solid #CAC4D0; border-radius: 0.25rem; cursor: pointer; position: relative; transition: all 0.2s; }
        .md3-checkbox:checked { background-color: #D0BCFF; border-color: #D0BCFF; }
        .md3-checkbox:checked::after { content: ''; position: absolute; left: 6px; top: 2px; width: 5px; height: 10px; border: solid #381E72; border-width: 0 2px 2px 0; transform: rotate(45deg); }
        .item-checked { text-decoration: line-through; color: #938F99; }
        
        .tab-btn { flex: 1; padding: 0.75rem; text-align: center; font-size: 0.875rem; font-weight: 600; border-radius: 0.5rem; transition: all 0.2s; color: #CAC4D0; }
        .tab-active { background-color: #4A4458; color: #D0BCFF; }
        .tab-disabled { opacity: 0.5; cursor: not-allowed; }

        .fab-main { position: fixed; bottom: 1.5rem; right: 1.5rem; background-color: #D0BCFF; color: #381E72; width: 3.5rem; height: 3.5rem; border-radius: 1rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15); cursor: pointer; z-index: 50; }
        .fab-up { position: fixed; bottom: 5.5rem; right: 1.5rem; background-color: #36343B; color: #CAC4D0; width: 2.5rem; height: 2.5rem; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.2); cursor: pointer; z-index: 40; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .fab-up.visible { opacity: 1; pointer-events: auto; }
        
        .spinner { animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        #snackbar { visibility: hidden; min-width: 250px; background-color: #313033; color: #F4EFF4; text-align: center; border-radius: 0.5rem; padding: 1rem; position: fixed; z-index: 100; left: 50%; bottom: 30px; transform: translateX(-50%); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #snackbar.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }
        
        .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #4A4458; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: #E6E1E5; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #D0BCFF; }
        input:checked + .slider:before { transform: translateX(20px); background-color: #381E72; }
    </style>
</head>
<body class="pb-24 p-4 md:p-8 max-w-lg mx-auto md:max-w-4xl">

    <header class="mb-4">
        <h1 class="text-2xl font-bold mb-4 flex items-center gap-2 text-[#D0BCFF]">
            <span class="material-symbols-outlined">account_balance_wallet</span> Presupuesto Pro
        </h1>
        <input type="text" id="budget-name" placeholder="Nombre (ej. Q1 - Noviembre)" class="w-full p-4 text-lg font-medium bg-[#4A4458] text-[#E6E1E5] rounded-xl border-none outline-none focus:ring-2 focus:ring-[#D0BCFF]" value="Quincena Actual">
    </header>

    <div class="flex bg-[#36343B] rounded-xl p-1 mb-6 border border-[#4A4458]">
        <button onclick="switchTab('super')" id="tab-super" class="tab-btn tab-active">🛒 Súper/Casa</button>
        <button onclick="switchTab('general')" id="tab-general" class="tab-btn">💳 Generales</button>
        <button onclick="switchTab('historial')" id="tab-historial" class="tab-btn">📊 Historial</button>
    </div>

    <div id="modal-factura" class="hidden fixed inset-0 bg-black bg-opacity-70 z-[60] flex items-center justify-center p-4">
        <div class="md3-card w-full max-w-md max-h-[80vh] flex flex-col border border-[#4A4458]">
            <div class="p-4 border-b border-[#4A4458] flex justify-between items-center">
                <h2 class="text-lg font-bold text-[#E6E1E5]">Revisar Productos</h2>
                <button onclick="cerrarModalFactura()" class="text-[#938F99]"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="modal-productos-list" class="p-4 overflow-y-auto flex-1 space-y-3">
                </div>
            <div class="p-4 border-t border-[#4A4458]">
                <button onclick="aprobarInyeccionFactura()" class="w-full bg-[#D0BCFF] text-[#381E72] font-bold py-3 rounded-xl transition-colors">Aprobar e Inyectar</button>
            </div>
        </div>
    </div>

    <div id="loader-factura" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[70] flex flex-col items-center justify-center">
        <span class="material-symbols-outlined text-5xl text-[#D0BCFF] spinner mb-4" style="display:block">progress_activity</span>
        <p class="text-[#E6E1E5] font-semibold">Analizando factura con IA...</p>
    </div>

    <div id="view-active">
        
        <div class="md3-card p-5 mb-6 border border-[#4A4458]">
            <div class="grid grid-cols-2 gap-4 mb-4 pb-4 border-b border-[#4A4458]">
                <div>
                    <label class="text-xs text-[#CAC4D0] block mb-1">Sueldo Andrés</label>
                    <input type="number" id="ingreso-andres" step="0.01" class="md3-input" onchange="updateConfig()">
                </div>
                <div>
                    <label class="text-xs text-[#CAC4D0] block mb-1">Sueldo Adriana</label>
                    <input type="number" id="ingreso-adriana" step="0.01" class="md3-input" onchange="updateConfig()">
                </div>
            </div>

            <div class="flex justify-between items-center mb-4">
                <label class="text-sm font-semibold text-[#E6E1E5]">Habilitar Súper (Q2)</label>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-super-activo" onchange="updateConfig()">
                    <span class="slider"></span>
                </label>
            </div>

            <div id="panel-super-config" class="grid grid-cols-2 gap-4 border-b border-[#4A4458] pb-4 mb-4">
                <div>
                    <label class="text-[10px] text-[#CAC4D0] uppercase font-semibold block mb-1">Guía Súper</label>
                    <div class="flex items-center">
                        <span class="text-[#938F99] mr-1">Q</span>
                        <input type="number" id="config-super" step="0.01" class="md3-input bg-transparent border-b border-[#4A4458] rounded-none p-1 text-left w-full" onchange="updateConfig()">
                    </div>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-[#938F99] uppercase">Restante Súper</p>
                    <p id="saldo-super" class="text-xl font-bold text-[#D0BCFF] font-mono">Q 0.00</p>
                </div>
            </div>

            <div class="bg-[#36343B] p-3 rounded-xl flex justify-between items-center mt-2">
                <p class="text-xs text-[#CAC4D0] font-semibold">Saldo Líquido Disponible</p>
                <p id="saldo-total" class="text-xl font-bold font-mono">Q 0.00</p>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4 px-2">
            <div class="flex items-center gap-3">
                <h2 class="text-sm font-semibold text-[#E6E1E5] uppercase tracking-wide">Desglose Quincenal</h2>
                <input type="file" id="input-factura" class="hidden" accept="image/*,application/pdf" onchange="procesarArchivoFactura(event)">
                <button onclick="document.getElementById('input-factura').click()" id="btn-scan-factura" class="bg-[#4A4458] text-[#D0BCFF] p-1.5 rounded-lg flex items-center gap-1 hover:bg-[#D0BCFF] hover:text-[#381E72] transition-colors">
                    <span class="material-symbols-outlined text-[18px]">document_scanner</span>
                    <span class="text-xs font-bold">Escanear FEL</span>
                </button>
            </div>
            
            <div class="flex items-center gap-2">
                <span class="text-xs text-[#CAC4D0]">Ocultar Comprados</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-pendientes" onchange="renderLists()">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="lists-container" class="space-y-6 mb-8"></div>

        <button onclick="cerrarQuincena()" class="w-full bg-[#381E72] hover:bg-[#4A4458] text-[#D0BCFF] font-bold py-4 rounded-xl border border-[#D0BCFF] transition-colors flex items-center justify-center gap-2">
            <span class="material-symbols-outlined">inventory_2</span> CERRAR Y GUARDAR QUINCENA
        </button>
    </div>

    <div id="view-historial" class="hidden">
        <div class="md3-card p-6 border border-[#4A4458] text-center mb-6">
            <span class="material-symbols-outlined text-4xl text-[#D0BCFF] mb-2">history</span>
            <h2 class="text-xl font-bold text-[#E6E1E5]">Historial de Quincenas</h2>
        </div>
        <div id="historial-container" class="space-y-4"></div>
    </div>

    <button id="fab-up" class="fab-up" onclick="window.scrollTo(0,0)">
        <span class="material-symbols-outlined">arrow_upward</span>
    </button>
    <button id="fab-sync" class="fab-main" onclick="syncData()">
        <span id="fab-icon" class="material-symbols-outlined text-3xl">cloud_sync</span>
        <span id="fab-spinner" class="material-symbols-outlined text-3xl spinner">progress_activity</span>
    </button>
    <div id="snackbar">Acción completada</div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwGBNTPrLbxEG8i8pHVHgfTMebkfPUpiTdaXvbr9NIiShK7CFY5VlE6QxT32LINoZiq/exec';
        
        const defaultData = {
            config: { andres: 2841.00, adriana: 1000.00, presupuestoSuper: 900.00, superActivo: true },
            facturasPendientes: [], 
            super: { insumos: [], comida: [], casa: [] },
            general: { transferencias: [], efectivo: [], cuenta_transitoria: [] }
        };

        const categoryStyles = {
            insumos: { title: 'Insumos Personales', icon: 'soap', color: '#FCD34D' },
            comida: { title: 'Comida', icon: 'restaurant', color: '#86EFAC' },
            casa: { title: 'Limpieza Casa', icon: 'home', color: '#93C5FD' },
            transferencias: { title: 'Transferencias', icon: 'swap_horiz', color: '#F87171' },
            efectivo: { title: 'Efectivo', icon: 'payments', color: '#C084FC' },
            cuenta_transitoria: { title: 'Cuenta Transitoria', icon: 'account_balance', color: '#6EE7B7' }
        };

        let appData = JSON.parse(localStorage.getItem('budgetAppData_v6')) || defaultData;
        let historyData = JSON.parse(localStorage.getItem('budgetHistory_v2')) || [];
        let activeTab = 'super';
        let facturaDataTemporal = []; 
        let facturaUrlTemporal = "";

        if(!appData.config) appData.config = defaultData.config;
        if(appData.config.superActivo === undefined) appData.config.superActivo = true;
        if(!appData.facturasPendientes) appData.facturasPendientes = [];

        document.getElementById('ingreso-andres').value = appData.config.andres;
        document.getElementById('ingreso-adriana').value = appData.config.adriana;
        document.getElementById('config-super').value = appData.config.presupuestoSuper;
        document.getElementById('toggle-super-activo').checked = appData.config.superActivo;

        function saveLocal() {
            localStorage.setItem('budgetAppData_v6', JSON.stringify(appData));
            localStorage.setItem('budgetHistory_v2', JSON.stringify(historyData));
            updateLogic();
        }

        function formatQ(val) { return `Q ${parseFloat(val).toFixed(2)}`; }

        function switchTab(tabName) {
            activeTab = tabName;
            const btnSuper = document.getElementById('tab-super');
            
            btnSuper.classList.toggle('tab-active', tabName === 'super');
            document.getElementById('tab-general').classList.toggle('tab-active', tabName === 'general');
            document.getElementById('tab-historial').classList.toggle('tab-active', tabName === 'historial');
            
            const btnScan = document.getElementById('btn-scan-factura');
            
            if(!appData.config.superActivo && tabName !== 'historial') {
                btnSuper.classList.add('tab-disabled');
            } else {
                btnSuper.classList.remove('tab-disabled');
            }

            if(tabName === 'historial') {
                document.getElementById('view-active').classList.add('hidden');
                document.getElementById('view-historial').classList.remove('hidden');
                document.getElementById('fab-sync').style.display = 'none';
                renderHistorial();
            } else {
                document.getElementById('view-active').classList.remove('hidden');
                document.getElementById('view-historial').classList.add('hidden');
                document.getElementById('fab-sync').style.display = 'flex';
                
                if(btnScan) btnScan.style.display = tabName === 'super' ? 'flex' : 'none';
                
                renderLists();
            }
            updateLogic();
        }

        function updateConfig() {
            appData.config.andres = parseFloat(document.getElementById('ingreso-andres').value) || 0;
            appData.config.adriana = parseFloat(document.getElementById('ingreso-adriana').value) || 0;
            appData.config.presupuestoSuper = parseFloat(document.getElementById('config-super').value) || 0;
            appData.config.superActivo = document.getElementById('toggle-super-activo').checked;
            
            saveLocal();
            if(activeTab === 'super') renderLists();
        }

        function updateLogic() {
            let realSuper = 0, realGeneral = 0;
            let limitSuper = 0;
            
            Object.keys(appData.general).forEach(cat => appData.general[cat].forEach(i => realGeneral += i.actual));

            const panelSuper = document.getElementById('panel-super-config');
            if(appData.config.superActivo) {
                panelSuper.style.opacity = '1';
                panelSuper.style.pointerEvents = 'auto';
                limitSuper = appData.config.presupuestoSuper || 0;
                Object.keys(appData.super).forEach(cat => appData.super[cat].forEach(i => realSuper += i.actual));
            } else {
                panelSuper.style.opacity = '0.3';
                panelSuper.style.pointerEvents = 'none';
                limitSuper = 0; 
                realSuper = 0;
            }

            const diffSuper = limitSuper - realSuper;
            const saldoSuperEl = document.getElementById('saldo-super');
            saldoSuperEl.textContent = formatQ(diffSuper);
            saldoSuperEl.className = `text-xl font-bold font-mono ${diffSuper >= 0 ? 'text-[#86EFAC]' : 'text-[#F87171]'}`;
            
            const totalIngresos = (appData.config.andres || 0) + (appData.config.adriana || 0);
            const saldoTotal = totalIngresos - realGeneral;
            const saldoTotalEl = document.getElementById('saldo-total');
            saldoTotalEl.textContent = formatQ(saldoTotal);
            saldoTotalEl.className = `text-xl font-bold font-mono ${saldoTotal >= 0 ? 'text-[#86EFAC]' : 'text-[#F87171]'}`;
            
            const btnSuper = document.getElementById('tab-super');
            if(!appData.config.superActivo) btnSuper.classList.add('tab-disabled');
            else btnSuper.classList.remove('tab-disabled');
        }

        function renderLists() {
            const container = document.getElementById('lists-container');
            container.innerHTML = '';
            
            if (activeTab === 'super' && !appData.config.superActivo) {
                container.innerHTML = `
                <div class="md3-card p-8 text-center border border-[#4A4458] border-dashed">
                    <span class="material-symbols-outlined text-4xl text-[#938F99] mb-2">shopping_cart_off</span>
                    <h3 class="text-[#E6E1E5] font-bold">Súper Deshabilitado</h3>
                    <p class="text-sm text-[#938F99] mt-2">Esta sección está apagada para la quincena actual.</p>
                </div>`;
                return;
            }

            const hideBought = document.getElementById('toggle-pendientes').checked;
            
            Object.keys(appData[activeTab]).forEach(cat => {
                const conf = categoryStyles[cat] || { title: cat, icon: 'list', color: '#fff' };
                let subtotalReal = 0;
                appData[activeTab][cat].forEach(i => subtotalReal += i.actual);

                let catHTML = `
                <div class="md3-card overflow-hidden">
                    <div class="p-4 flex items-center justify-between border-b border-[#4A4458] bg-[#36343B]">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined" style="color: ${conf.color}">${conf.icon}</span>
                            <h3 class="font-semibold text-[#E6E1E5]">${conf.title}</h3>
                        </div>
                        <span class="text-sm font-bold font-mono text-[#D0BCFF]">${formatQ(subtotalReal)}</span>
                    </div>
                    <div class="p-2 space-y-1">`;
                
                appData[activeTab][cat].forEach((item, index) => {
                    if (hideBought && item.checked) return;
                    catHTML += `
                        <div class="flex items-center gap-2 p-3 bg-[#1C1B1F] rounded-xl border border-transparent focus-within:border-[#4A4458] transition-colors">
                            <input type="checkbox" class="md3-checkbox shrink-0" ${item.checked ? 'checked' : ''} 
                                onchange="toggleCheck('${activeTab}', '${cat}', ${index})">
                            <div class="flex-1 min-w-0">
                                <p class="text-sm font-medium truncate ${item.checked ? 'item-checked' : ''}">${item.nombre}</p>
                                <p class="text-[10px] text-[#CAC4D0]">P: ${formatQ(item.budget)}</p>
                            </div>
                            <div class="flex flex-col w-16">
                                <input type="number" step="0.01" value="${item.actual === 0 ? '' : item.actual}" placeholder="0.00"
                                    class="md3-input p-1" onchange="updateActual('${activeTab}', '${cat}', ${index}, this.value)">
                            </div>
                            <button onclick="deleteItem('${activeTab}', '${cat}', ${index})" class="p-2 ml-1 text-[#938F99] hover:text-[#F87171] bg-transparent transition-colors rounded-lg flex items-center justify-center">
                                <span class="material-symbols-outlined text-[20px]">delete</span>
                            </button>
                        </div>`;
                });
                
                catHTML += `
                    <form onsubmit="addItem(event, '${activeTab}', '${cat}')" class="flex gap-2 p-2 mt-2 bg-[#36343B] rounded-lg border border-[#4A4458] border-dashed">
                        <input type="text" name="nombre" placeholder="Nuevo artículo..." required class="md3-input md3-input-text flex-1 text-sm p-2 bg-[#1C1B1F]">
                        <input type="number" step="0.01" name="budget" placeholder="Presup." class="md3-input w-20 text-sm p-2 bg-[#1C1B1F]">
                        <button type="submit" class="bg-[#4A4458] text-[#D0BCFF] px-3 rounded-lg hover:bg-[#D0BCFF] hover:text-[#381E72] transition-colors">
                            <span class="material-symbols-outlined text-sm">add</span>
                        </button>
                    </form>
                </div></div>`;
                container.innerHTML += catHTML;
            });
        }

        function toggleCheck(vista, cat, index) { 
            let item = appData[vista][cat][index];
            item.checked = !item.checked; 
            if (item.checked) { if (item.actual === 0) item.actual = item.budget; } 
            else { item.actual = 0; }
            saveLocal(); renderLists(); 
        }
        
        function updateActual(vista, cat, index, value) { 
            let val = parseFloat(value);
            appData[vista][cat][index].actual = isNaN(val) ? 0 : val;
            if(appData[vista][cat][index].actual > 0) appData[vista][cat][index].checked = true;
            if(appData[vista][cat][index].actual === 0) appData[vista][cat][index].checked = false;
            saveLocal(); renderLists(); 
        }

        function addItem(e, vista, cat) {
            e.preventDefault();
            const form = e.target;
            const nombre = form.nombre.value.trim();
            const budget = parseFloat(form.budget.value) || 0;
            if(nombre) {
                appData[vista][cat].push({ id: 'n_' + Date.now(), nombre: nombre, budget: budget, actual: 0, checked: false });
                saveLocal(); renderLists();
            }
        }

        function deleteItem(vista, cat, index) {
            if(confirm("¿Seguro que deseas borrar permanentemente este artículo?")) {
                appData[vista][cat].splice(index, 1);
                saveLocal(); renderLists();
            }
        }

        function procesarArchivoFactura(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            if(file.size > 5 * 1024 * 1024) {
                alert("El archivo es muy pesado. Sube una imagen/PDF menor a 5MB.");
                return;
            }

            document.getElementById('loader-factura').classList.remove('hidden');

            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Data = event.target.result.split(',')[1];
                enviarFacturaGemini(file.name, file.type, base64Data);
            };
            reader.readAsDataURL(file);
            e.target.value = ''; 
        }

        async function enviarFacturaGemini(fileName, mimeType, base64Data) {
            const payload = { tipo: "upload_factura", fileName: fileName, mimeType: mimeType, base64Data: base64Data };

            try {
                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // CORRECCIÓN PARA EVITAR CORS PREFLIGHT
                    body: JSON.stringify(payload),
                    redirect: 'follow' 
                });
                
                const result = await response.json();
                
                document.getElementById('loader-factura').classList.add('hidden');

                if(result.status === "error") {
                    alert("Error analizando: " + result.message);
                    return;
                }

                facturaUrlTemporal = result.fileUrl;
                facturaDataTemporal = result.productos;
                renderModalFactura();
                
            } catch (error) {
                document.getElementById('loader-factura').classList.add('hidden');
                alert("Error de conexión al enviar factura.");
                console.error(error);
            }
        }

        function renderModalFactura() {
            const list = document.getElementById('modal-productos-list');
            list.innerHTML = '';
            
            if(!facturaDataTemporal || facturaDataTemporal.length === 0) {
                list.innerHTML = '<p class="text-[#938F99] text-center">No se detectaron productos legibles.</p>';
            } else {
                facturaDataTemporal.forEach((prod, index) => {
                    list.innerHTML += `
                    <div class="bg-[#36343B] p-3 rounded-xl border border-[#4A4458] relative" id="modal-item-${index}">
                        <button onclick="eliminarItemModal(${index})" class="absolute top-2 right-2 text-[#938F99] hover:text-[#F87171]"><span class="material-symbols-outlined text-sm">close</span></button>
                        <input type="text" id="modal-nombre-${index}" value="${prod.nombre}" class="bg-transparent border-b border-[#4A4458] text-[#E6E1E5] text-sm w-11/12 outline-none mb-2 focus:border-[#D0BCFF]">
                        <div class="flex gap-2">
                            <select id="modal-cat-${index}" class="bg-[#1C1B1F] text-[#CAC4D0] text-xs p-1 rounded border border-[#4A4458] outline-none">
                                <option value="insumos" ${prod.categoria === 'insumos' ? 'selected' : ''}>Insumos</option>
                                <option value="comida" ${prod.categoria === 'comida' ? 'selected' : ''}>Comida</option>
                                <option value="casa" ${prod.categoria === 'casa' ? 'selected' : ''}>Casa</option>
                            </select>
                            <div class="flex items-center flex-1">
                                <span class="text-[#938F99] text-xs mr-1">Q</span>
                                <input type="number" id="modal-precio-${index}" step="0.01" value="${prod.budget}" class="bg-[#1C1B1F] text-[#E6E1E5] text-xs p-1 rounded border border-[#4A4458] w-full text-right outline-none">
                            </div>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('modal-factura').classList.remove('hidden');
        }

        function eliminarItemModal(index) {
            document.getElementById(`modal-item-${index}`).style.display = 'none';
            facturaDataTemporal[index].borrado = true;
        }

        function cerrarModalFactura() {
            document.getElementById('modal-factura').classList.add('hidden');
            facturaDataTemporal = [];
            facturaUrlTemporal = "";
        }

        function aprobarInyeccionFactura() {
            if(!facturaDataTemporal) return;
            
            let count = 0;
            facturaDataTemporal.forEach((prod, index) => {
                if(prod.borrado) return;
                
                const finalNombre = document.getElementById(`modal-nombre-${index}`).value;
                const finalCat = document.getElementById(`modal-cat-${index}`).value;
                const finalPrecio = parseFloat(document.getElementById(`modal-precio-${index}`).value) || 0;
                
                appData.super[finalCat].push({
                    id: 'f_' + Date.now() + Math.random(),
                    nombre: "*(FEL) " + finalNombre,
                    budget: finalPrecio,
                    actual: finalPrecio,
                    checked: true
                });
                count++;
            });
            
            if(facturaUrlTemporal) {
                appData.facturasPendientes.push(facturaUrlTemporal);
            }
            
            saveLocal();
            renderLists();
            cerrarModalFactura();
            showSnackbar(`${count} productos inyectados al Súper`);
        }

        function cerrarQuincena() {
            if(!confirm("¿Seguro que deseas Cerrar la Quincena? \n\nTus ingresos y gastos volverán a Q0.00, pero la plantilla se conserva.")) return;
            let totalG = 0;
            Object.keys(appData.general).forEach(c => appData.general[c].forEach(i => totalG += i.actual));
            
            const totalIngresos = (appData.config.andres || 0) + (appData.config.adriana || 0);
            
            const record = {
                id: Date.now(),
                fecha: new Date().toLocaleDateString('es-GT'),
                nombre: document.getElementById('budget-name').value || 'Quincena',
                ingresos: totalIngresos,
                gastos: totalG,
                ahorro: totalIngresos - totalG,
                facturas: [...appData.facturasPendientes] 
            };
            
            historyData.unshift(record);

            Object.keys(appData.general).forEach(c => {
                appData.general[c].forEach(item => { item.actual = 0; item.checked = false; });
            });
            if(appData.config.superActivo) {
                Object.keys(appData.super).forEach(c => {
                    appData.super[c].forEach(item => { item.actual = 0; item.checked = false; });
                });
            }

            appData.facturasPendientes = [];
            saveLocal();
            document.getElementById('toggle-pendientes').checked = false;
            showSnackbar("Quincena Cerrada y Guardada en Historial");
            switchTab('historial');
            syncData(record);
        }

        function renderHistorial() {
            const container = document.getElementById('historial-container');
            container.innerHTML = '';
            if(historyData.length === 0) {
                container.innerHTML = `<p class="text-center text-[#938F99]">Aún no hay quincenas cerradas.</p>`;
                return;
            }

            historyData.forEach(h => {
                let linksHTML = '';
                if(h.facturas && h.facturas.length > 0) {
                    linksHTML = `<div class="mt-3 border-t border-[#4A4458] pt-2 flex gap-2 flex-wrap">
                        ${h.facturas.map((url, i) => `<a href="${url}" target="_blank" class="text-xs text-[#D0BCFF] bg-[#381E72] px-2 py-1 rounded">Factura ${i+1}</a>`).join('')}
                    </div>`;
                }

                container.innerHTML += `
                <div class="md3-card p-4 border border-[#4A4458]">
                    <div class="flex justify-between items-start border-b border-[#4A4458] pb-2 mb-2">
                        <div>
                            <h4 class="font-bold text-[#E6E1E5]">${h.nombre}</h4>
                            <p class="text-xs text-[#938F99]">${h.fecha}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] text-[#CAC4D0] uppercase">Sobrante</p>
                            <p class="font-bold ${h.ahorro >= 0 ? 'text-[#86EFAC]' : 'text-[#F87171]'}">${formatQ(h.ahorro)}</p>
                        </div>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-[#CAC4D0]">Ingresos: ${formatQ(h.ingresos)}</span>
                        <span class="text-[#F2B8B5]">Gastos: ${formatQ(h.gastos)}</span>
                    </div>
                    ${linksHTML}
                </div>`;
            });
        }

        function showSnackbar(msg) {
            const sb = document.getElementById("snackbar");
            sb.textContent = msg; sb.className = "show";
            setTimeout(() => { sb.className = sb.className.replace("show", ""); }, 3000);
        }

        window.onscroll = function() {
            const fabUp = document.getElementById('fab-up');
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) fabUp.classList.add('visible');
            else fabUp.classList.remove('visible');
        };

        async function syncData(cerrarRecord = null) {
            const icon = document.getElementById('fab-icon'), spinner = document.getElementById('fab-spinner');
            icon.style.display = 'none'; spinner.style.display = 'block';

            const dataToSync = JSON.parse(JSON.stringify(appData));
            if(!appData.config.superActivo) { delete dataToSync.super; }

            const payload = {
                tipo: cerrarRecord ? "cierre" : "sincronizacion",
                budgetName: document.getElementById('budget-name').value || 'Quincena',
                data: dataToSync,
                resumen: cerrarRecord
            };
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // CORRECCIÓN PARA EVITAR CORS PREFLIGHT
                    body: JSON.stringify(payload),
                    redirect: 'follow'
                });
                showSnackbar(cerrarRecord ? "Resumen enviado a Sheets" : "Sincronizado con Sheets");
            } catch (error) { 
                showSnackbar("Error de conexión");
            } finally { 
                icon.style.display = 'block';
                spinner.style.display = 'none'; 
            }
        }

        document.addEventListener('DOMContentLoaded', () => { 
            switchTab('super'); 
            updateLogic(); 
        });
    </script>
</body>
</html>
